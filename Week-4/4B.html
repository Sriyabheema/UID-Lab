<!DOCTYPE html> 

<html> 

<head> 

<title>Login & Registration</title> 

</head> 

 

<body bgcolor="#E8F5E9"> 

 

<center> 

 

<table border="0" cellpadding="20"> 

<tr> 

 

<!-- LOGIN TABLE --> 

<td> 

<h2>LOGIN DETAILS</h2> 

 

<form> 

<table border="1" cellpadding="8" bordercolor="#A5D6A7" bgcolor="#F1FAF4"> 

 

<tr> 

<td>Username :</td> 

<td><input type="text"></td> 

</tr> 

 

<tr> 

<td>Password :</td> 

<td><input type="password"></td> 

</tr> 

 

<tr> 

<td colspan="2" align="center"> 

<input type="submit" value="LOGIN"> 

<input type="reset" value="CLEAR"> 

</td> 

</tr> 

 

</table> 

</form> 

</td> 

 

<!-- REGISTRATION TABLE --> 

<td> 

<h2>USER REGISTRATION</h2> 

 

<form> 

<table border="1" cellpadding="8" bordercolor="#A5D6A7" bgcolor="#F1FAF4"> 

 

<tr> 

<td>Full Name :</td> 

<td><input type="text"></td> 

</tr> 

 

<tr> 

<td>Email :</td> 

<td><input type="email"></td> 

</tr> 

 

<tr> 

<td>Phone :</td> 

<td><input type="text"></td> 

</tr> 

 

<tr> 

<td>Password :</td> 

<td><input type="password"></td> 

</tr> 

 

<tr> 

<td>Confirm Password :</td> 

<td><input type="password"></td> 

</tr> 

 

<tr> 

<td colspan="2" align="center"> 

<input type="submit" value="REGISTER"> 

<input type="reset" value="RESET"> 

</td> 

</tr> 

 

</table> 

</form> 

</td> 

 

</tr> 

</table> 

 

</center> 

 

</body> 

</html>
