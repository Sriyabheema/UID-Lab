<!DOCTYPE html>  

<html> 

<head> 

    <title>College Admission Form</title> 

</head> 

 

<body bgcolor="#F8F4FF"> 

 

<center> 

    <h1>College Online Admission Form</h1> 

    <h3>Student Registration Form</h3> 

</center> 

 

<form> 

    <table align="center" border="2" cellpadding="10" cellspacing="0" bgcolor="#FFFFFF"> 

 

        <tr> 

            <td><label>Full Name:</label></td> 

            <td><input type="text" name="fullname" size="30" required></td> 

        </tr> 

 

        <tr> 

            <td><label>Father's Name:</label></td> 

            <td><input type="text" name="fathername" size="30" required></td> 

        </tr> 

 

        <tr> 

            <td><label>Mother's Name:</label></td> 

            <td><input type="text" name="mothername" size="30" required></td> 

        </tr> 

 

        <tr> 

            <td><label>Date of Birth:</label></td> 

            <td><input type="date" name="dob" required></td> 

        </tr> 

 

        <tr> 

            <td><label>Gender:</label></td> 

            <td> 

                <input type="radio" name="gender" value="Male"> Male 

                <input type="radio" name="gender" value="Female"> Female 

                <input type="radio" name="gender" value="Other"> Other 

            </td> 

        </tr> 

 

        <tr> 

            <td><label>Email:</label></td> 

            <td><input type="email" name="email" size="30" required></td> 

        </tr> 

 

        <tr> 

            <td><label>Mobile Number:</label></td> 

            <td><input type="tel" name="mobile" size="30" required></td> 

        </tr> 

 

        <tr> 

            <td><label>Address:</label></td> 

            <td><textarea name="address" rows="4" cols="30" required></textarea></td> 

        </tr> 

 

        <tr> 

            <td><label>City:</label></td> 

            <td><input type="text" name="city" size="30" required></td> 

        </tr> 

 

        <tr> 

            <td><label>State:</label></td> 

            <td><input type="text" name="state" size="30" required></td> 

        </tr> 

 

        <tr> 

            <td><label>Pin Code:</label></td> 

            <td><input type="number" name="pincode" size="30" required></td> 

        </tr> 

 

        <tr> 

            <td><label>Course Applying For:</label></td> 

            <td> 

                <select name="course" required> 

                    <option value="">-- Select Course --</option> 

                    <option value="BCA">BCA</option> 

                    <option value="BBA">BBA</option> 

                    <option value="BSc">B.Sc</option> 

                    <option value="BA">BA</option> 

                    <option value="BCom">B.Com</option> 

                    <option value="MCA">MCA</option> 

                    <option value="MBA">MBA</option> 

                </select> 

            </td> 

        </tr> 

 

        <tr> 

            <td><label>Hobbies:</label></td> 

            <td> 

                <input type="checkbox" name="hobby" value="Reading"> Reading 

                <input type="checkbox" name="hobby" value="Sports"> Sports 

                <input type="checkbox" name="hobby" value="Music"> Music 

                <input type="checkbox" name="hobby" value="Travel"> Travel 

            </td> 

        </tr> 

 

        <tr> 

            <td><label>Nationality:</label></td> 

            <td><input type="text" name="nationality" size="30" required></td> 

        </tr> 

 

        <tr> 

            <td><label>Upload Passport Photo:</label></td> 

            <td><input type="file" name="photo" required></td> 

        </tr> 

 

        <tr> 

            <td><label>Upload Certificates:</label></td> 

            <td><input type="file" name="marksheet" required></td> 

        </tr> 

 

        <tr> 

            <td colspan="2" align="center"> 

                <input type="submit" value="Submit Form"> 

                <input type="reset" value="Reset Form"> 

            </td> 

        </tr> 

 

    </table> 

</form> 

 

</body> 

</html>
