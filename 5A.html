<!DOCTYPE html> 

<html> 

<head> 

    <title>Week5-A</title> 

 

    <style> 

        body { 

            font-family: Arial, sans-serif; 

            background-color: #f3edf8; 

            padding: 40px; 

        } 

 

        .container { 

            display: flex; 

            justify-content: center; 

            gap: 30px; 

        } 

 

        .card { 

            width: 250px; 

            background-color: rgb(248, 247, 248); 

            border-radius: 8px; 

            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 

            text-align: center; 

            padding-bottom: 20px; 

        } 

 

        .card img { 

            width: 100%; 

            height: 350px; 

            object-fit: contain; 

            margin-top: 10px; 

        } 

 

        .card h2 { 

            margin: 10px 0 5px; 

            color: #2c3e50; 

        } 

 

        .card p { 

            font-size: 14px; 

            padding: 0 15px; 

            color: #555; 

        } 

 

        .card button { 

            margin-top: 12px; 

            padding: 8px 18px; 

            background-color: #3c6382; 

            color: white; 

            border: none; 

            border-radius: 4px; 

            cursor: pointer; 

            box-shadow: 0 4px #2a4d69;   /* gives depth */ 

            transition: 0.1s; 

        } 

 

        /* Hover effect */ 

        .card button:hover { 

            background-color: #0a3d62; 

        } 

 

        /* Press effect */ 

        .card button:active { 

            box-shadow: 0 1px #2a4d69; 

            transform: translateY(3px); 

        } 

 

    </style> 

</head> 

 

<body> 

 

    <div class="container"> 

 

        <div class="card"> 

            <img src="amma.jpg" alt="Chancellor Image"> 

            <h2>Chancellor</h2> 

            <p>Leading the institution with dedication and vision.</p> 

            <button>View More</button> 

        </div> 

 

        <div class="card"> 

            <img src="amma.jpg" alt="Chancellor Image"> 

            <h2>Chancellor</h2> 

            <p>Leading the institution with dedication and vision.</p> 

            <button>View More</button> 

        </div> 

 

        <div class="card"> 

            <img src="amma.jpg" alt="Chancellor Image"> 

            <h2>Chancellor</h2> 

            <p>Leading the institution with dedication and vision.</p> 

            <button>View More</button> 

        </div> 

 

    </div> 

 

</body> 

</html>
